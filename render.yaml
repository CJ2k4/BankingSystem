# Render Blueprint — provisions the backend, Postgres, and Redis (Key Value).
# Render has no managed Kafka, so the event pipeline is disabled in this deploy
# (EVENTS_ENABLED=false); the publisher no-ops and core banking is unaffected.
# Frontend is deployed separately on Vercel.

databases:
  - name: banking-postgres
    plan: free
    databaseName: banking
    user: banking

services:
  - type: redis
    name: banking-redis
    plan: free
    ipAllowList: []          # internal only
    maxmemoryPolicy: noeviction

  - type: web
    name: banking-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: EVENTS_ENABLED
        value: "false"
      - key: SEED_DEMO
        value: "true"
      - key: DB_HOST
        fromDatabase: { name: banking-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: banking-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: banking-postgres, property: database }
      - key: DB_USERNAME
        fromDatabase: { name: banking-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: banking-postgres, property: password }
      - key: REDIS_HOST
        fromService: { name: banking-redis, type: redis, property: host }
      - key: REDIS_PORT
        fromService: { name: banking-redis, type: redis, property: port }
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false           # set to the Vercel URL after the frontend is deployed
