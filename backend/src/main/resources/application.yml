spring:
  application:
    name: banking-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/banking}
    username: ${DB_USERNAME:banking}
    password: ${DB_PASSWORD:banking}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.bank.*"
        spring.json.value.default.type: com.bank.common.event.DomainEvent

  # Real email activates only when SPRING_MAIL_HOST is set (e.g. Mailtrap) — Boot then
  # auto-configures a JavaMailSender and EmailConfig switches to SMTP. Otherwise the
  # SimulatedEmailSender logs messages. (No spring.mail defaults here on purpose, so an
  # empty host doesn't trip the mail health check.)

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    # Email is best-effort; don't let a mail-server check fail the app's health.
    mail:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    # Override in any real environment. Must be >= 32 chars for HS256.
    secret: ${JWT_SECRET:dev-only-secret-change-me-0123456789-banking-system-hs256-key}
    issuer: banking-system
    access-token-ttl: ${JWT_ACCESS_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TTL:7d}
  seed:
    admin-email: ${ADMIN_EMAIL:admin@bank.local}
    admin-password: ${ADMIN_PASSWORD:Admin123!}
    demo: ${SEED_DEMO:false}
  stripe:
    # When secret-key is blank the app uses the simulated payment gateway.
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  events:
    topic: ${EVENTS_TOPIC:banking.events}
  mail:
    from: ${MAIL_FROM:no-reply@bank.local}
  ratelimit:
    enabled: ${RATELIMIT_ENABLED:true}
    auth-per-minute: ${RATELIMIT_AUTH_PER_MINUTE:20}
